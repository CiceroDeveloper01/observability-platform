name: Markdown

on:
  push:
    paths:
      - README.md
      - docs/**
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md
      - SECURITY.md
      - .github/workflows/markdown.yml
      - .markdownlint.json
  pull_request:
    paths:
      - README.md
      - docs/**
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md
      - SECURITY.md
      - .github/workflows/markdown.yml
      - .markdownlint.json

jobs:
  markdownlint:
    name: Lint markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install --global markdownlint-cli

      - name: Validate README and docs
        run: markdownlint README.md "docs/**/*.md" CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md
