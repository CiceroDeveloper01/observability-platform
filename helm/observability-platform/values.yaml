namespaceOverride: ""

grafana:
  image:
    repository: grafana/grafana-oss
    tag: "11.2.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  adminUser: admin
  adminPassword: admin

prometheus:
  image:
    repository: prom/prometheus
    tag: v2.54.1
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 9090

loki:
  image:
    repository: grafana/loki
    tag: "3.1.1"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 3100

tempo:
  image:
    repository: grafana/tempo
    tag: "2.6.1"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 3200
    otlpGrpcPort: 4317
    otlpHttpPort: 4318

otelCollector:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.111.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    grpcPort: 4317
    httpPort: 4318
    metricsPort: 8888
    prometheusPort: 8889
    healthPort: 13133
