apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      resource:
        attributes:
          - key: deployment.environment
            value: kubernetes
            action: upsert
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/tempo:
        endpoint: tempo:{{ .Values.tempo.service.otlpGrpcPort }}
        tls:
          insecure: true
      loki:
        endpoint: http://loki:{{ .Values.loki.service.port }}/loki/api/v1/push
        default_labels_enabled:
          exporter: true
          job: true
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [loki]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  type: {{ .Values.otelCollector.service.type }}
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: {{ .Values.otelCollector.service.grpcPort }}
      targetPort: otlp-grpc
    - name: otlp-http
      port: {{ .Values.otelCollector.service.httpPort }}
      targetPort: otlp-http
    - name: metrics
      port: {{ .Values.otelCollector.service.metricsPort }}
      targetPort: metrics
    - name: prom
      port: {{ .Values.otelCollector.service.prometheusPort }}
      targetPort: prom
    - name: health
      port: {{ .Values.otelCollector.service.healthPort }}
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: {{ .Values.otelCollector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
            - name: prom
              containerPort: 8889
            - name: health
              containerPort: 13133
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
